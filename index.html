<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemoz Label Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f7;--card:#fff;--border:#e2e8f0;--muted:#718096;--accent:#e8325a;--primary:#0f1117}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:#1a202c;font-size:13px}
.app-ui{display:block}
#print-area{display:none}
.hdr{background:var(--primary);color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px}
.hdr-logo em{color:var(--accent);font-style:normal}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.8px;padding:8px 18px;border:none;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#c9273d}.btn-p:disabled{background:#bbb;cursor:not-allowed}
.btn-g{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}.btn-g:hover{border-color:#fff}
.btn-d{background:#2d3748;color:#fff}.btn-d:hover{background:#1a202c}
.btn-pdf{background:#276749;color:#fff}.btn-pdf:hover{background:#1e5238}.btn-pdf:disabled{background:#bbb;cursor:not-allowed}
.wrap{max-width:680px;margin:0 auto;padding:28px 20px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.ch{padding:13px 20px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct{font-size:13.5px;font-weight:700}
.cb{padding:22px}
.ur{display:flex;gap:10px}
.ur input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif}
.ur input:focus{outline:none;border-color:var(--accent)}
.uh{margin-top:8px;font-size:11px;color:var(--muted);line-height:1.8}
.sb{border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;margin-top:12px}
.sb.L{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.sb.D{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.sb.E{background:#fff5f5;color:#c53030;border:1px solid #feb2b2}
.sp{width:16px;height:16px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi.full{grid-column:1/-1}
.fi label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.fi input,.fi textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:13px}
.fi input:focus,.fi textarea:focus{outline:none;border-color:var(--accent)}
.fi textarea{line-height:1.4;resize:vertical;min-height:68px}
.fi input::placeholder{color:#c0c8d4}
.ar{margin-top:18px;display:flex;justify-content:flex-end;gap:10px;align-items:center}
.ao{font-size:12px;color:#276749;font-weight:600;display:none}
.sg{display:flex;flex-direction:column;align-items:center;gap:32px;padding:32px 20px;background:#d8dbe5}
.sw{display:flex;flex-direction:column;align-items:center;gap:8px}
.sn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:#666;letter-spacing:1px}
.ss{box-shadow:0 4px 20px rgba(0,0,0,.22);overflow:hidden;width:378px;height:378px}
.si{width:100mm;height:100mm;transform:scale(1.0);transform-origin:top left}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
#pdf-progress{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
#pdf-progress.show{display:flex}
.pdf-box{background:#fff;border-radius:12px;padding:28px 36px;text-align:center;min-width:260px}
.pdf-box h3{font-size:15px;font-weight:700;margin-bottom:12px}
.pdf-bar-wrap{background:#f0f2f7;border-radius:99px;height:8px;overflow:hidden;margin-bottom:10px}
.pdf-bar{background:var(--accent);height:100%;border-radius:99px;transition:width .3s;width:0%}
.pdf-msg{font-size:12px;color:var(--muted)}
#help-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
#help-modal.show{display:flex}
.help-box{background:#fff;border-radius:12px;padding:32px;max-width:640px;width:92%;max-height:92vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.help-box h2{font-size:20px;font-weight:900;margin-bottom:24px;text-align:center}
.help-box h3{font-size:15px;font-weight:700;margin:28px 0 12px;color:#276749}
.help-box ol{line-height:1.7;padding-left:20px}
.help-box li{margin-bottom:10px}
.help-box p{font-size:12px;color:#666;margin-top:8px}
.lbl{width:100mm;height:100mm;background:#fff;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;border:1pt solid #111;overflow:hidden}
.lh{display:flex;align-items:center;justify-content:space-between;padding:2.5mm 3.5mm;border-bottom:1pt solid #111;flex-shrink:0}
.lh-t{font-size:9pt;font-weight:900;color:#111;letter-spacing:.3pt}
.lh-logo{height:4.5mm;width:auto}
.lb{flex:1;min-height:0;padding:0 3.5mm;display:flex;flex-direction:column;gap:4.5mm}
.lr{display:flex;align-items:flex-start;gap:3mm}
.lk{font-size:9pt;font-weight:700;color:#111;min-width:23.5mm;flex-shrink:0;line-height:1.55}
.lv{font-size:9pt;font-weight:700;color:#111;line-height:1.5;flex:1;white-space:pre-line}
.qty-table{width:100%;display:flex;flex-direction:column}
.qty-header{display:flex;justify-content:space-between;gap:4mm;margin-bottom:1pt;border-bottom:0.5pt solid #111;padding-bottom:1pt}
.qty-h{font-size:9pt;font-weight:700;color:#111;flex:1;text-align:center}
.qty-h.art{flex:2;text-align:left}
.qty-row{display:flex;justify-content:space-between;gap:4mm;align-items:baseline}
.qty-row:not(:last-child){border-bottom:0.5pt solid #111;padding-bottom:1pt;margin-bottom:1pt}
.qty-art{flex:2;white-space:pre-line;font-size:9pt}
.qty-val{font-size:9pt;font-weight:700;flex:1;text-align:center}
.li{flex-shrink:0;padding:1.5mm 3mm;display:flex;align-items:center;justify-content:center}
.li img{height:9mm;width:auto;display:block}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.app-ui{display:none!important}#print-area{display:block!important}@page{size:100mm 100mm;margin:0}.lbl{page-break-after:always;break-after:page;page-break-inside:avoid}.lbl:last-child{page-break-after:avoid;break-after:avoid}}
</style>
</head>
<body>

<div id="help-modal" onclick="if(event.target.id==='help-modal')hideHelp()">
  <div class="help-box" onclick="event.stopImmediatePropagation()">
    <h2>📖 Nemoz Label Generator 사용 방법</h2>
    <div style="display:flex;flex-direction:column;gap:14px;font-size:14px;line-height:1.7">
      <div>· Google 시트 <strong>납품서 탭</strong> URL 복사</div>
      <div>· ① URL 붙여넣기 → <strong>불러오기</strong></div>
      <div>· ② 공통 정보 자동 입력 확인 (수정 시 미리보기 자동 반영)</div>
      <div>· ③ 미리보기 확인 후 <strong>PDF 다운로드</strong></div>
    </div>
    <div style="text-align:center;margin-top:32px">
      <button class="btn btn-d" onclick="hideHelp()" style="padding:10px 28px">닫기</button>
    </div>
  </div>
</div>

<div id="pdf-progress">
  <div class="pdf-box">
    <h3>PDF 생성 중...</h3>
    <div class="pdf-bar-wrap"><div class="pdf-bar" id="pdf-bar"></div></div>
    <div class="pdf-msg" id="pdf-msg">준비 중</div>
  </div>
</div>

<div class="app-ui">
<div class="hdr">
  <div class="hdr-logo">Nemoz Label Generator</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-g" onclick="showHelp()">📖 사용방법</button>
    <button class="btn btn-g" onclick="location.reload()">↺ 초기화</button>
    <button class="btn btn-pdf" id="bpdf" onclick="doDownloadPDF()" disabled>⬇ PDF 다운로드</button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="ch"><span class="ct">① 구글 시트 URL 입력</span></div>
    <div class="cb">
      <div class="ur">
        <input type="text" id="su" placeholder="납품서 탭 URL 붙여넣기" onkeydown="if(event.key==='Enter')go()">
        <button class="btn btn-p" onclick="go()">불러오기</button>
      </div>
      <div class="uh">시트 URL 붙여넣기 (링크 있는 모든 사용자 → 뷰어 설정 필요)</div>
      <div id="sa"></div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><span class="ct">② 라벨 공통 정보</span></div>
    <div class="cb">
      <div id="common-fg" class="fg"></div>
    </div>
  </div>

  <div class="card">
    <div class="ch">
      <span class="ct">③ 라벨 스티커 미리보기</span>
      <span id="bb" style="font-size:11px;color:var(--muted)">시트를 불러오면 자동으로 채워집니다</span>
    </div>
    <div id="sp"><div class="empty"><div class="ei"><svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#c0c8d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5" fill="#c0c8d4" stroke="none"/></svg></div><div>시트 URL을 입력해주세요</div></div></div>
  </div>
</div>
</div>

<div id="print-area"></div>

<script>
const {jsPDF} = window.jspdf;
let boxes = [];
let commonData = {};
let commonOrder = [];

const safeTrim = v => (v || '').toString().trim();

const gv = id => {
  const el = document.getElementById(id);
  return el ? safeTrim(el.value) : '';
};

/* ★ FIX #2: 고정 필드는 commonData 유무와 무관하게 항상 읽기 */
const sh = () => {
  const data = {};
  const fixed = [
    { key: '상품명',    id: 'fn' },
    { key: '事務所',    id: 'fo' },
    { key: '品番',      id: 'fs' },
    { key: 'バーコード', id: 'fj' },
    { key: '原産国',    id: 'fr' },
  ];
  fixed.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) data[f.key] = safeTrim(el.value);
  });
  // 고정 외 extra 필드
  Object.keys(commonData).forEach(k => {
    if (fixed.some(f => f.key === k)) return;
    const el = document.getElementById('extra_' + k);
    if (el) data[k] = safeTrim(el.value);
  });
  return data;
};

const ICON_IMG_URL = 'https://nemozlab.github.io/label/images/label_icon.png';
const PX = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

async function fc(u) {
  try { const r = await fetch(u); if (r.ok) return r; } catch(e) {}
  for (const p of PX) {
    try { const r = await fetch(p(u)); if (r.ok) return r; } catch(e) {}
  }
  throw new Error('시트 접근 실패');
}

function ids(url) {
  return {
    id: (url.match(/\/d\/([a-zA-Z0-9_-]+)/) || [])[1] || null,
    gid: (url.match(/[?&#]gid=(\d+)/) || [])[1] || null
  };
}

async function go() {
  try {
    const url = gv('su');
    if (!url) { alert('URL을 입력해주세요'); return; }

    st('L', '시트 불러오는 중...');

    const {id, gid} = ids(url);
    if (!id) throw new Error('시트 ID를 찾을 수 없습니다');

    let bt = null;
    if (url.includes('/pub') && url.includes('output=csv')) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      bt = await r.text();
    } else {
      const r1 = await fc(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv${gid ? `&gid=${gid}` : ''}`);
      if (!r1.ok) throw new Error('시트 읽기 실패');
      bt = await r1.text();
    }

    boxes = parseCSV(bt);
    if (!boxes.length) throw new Error('박스 데이터가 없습니다');

    const parsed = parseCommonInfo(bt);
    commonData = parsed.map;
    commonOrder = parsed.order;
    buildCommonUI();

    render();
    st('D', `✅ ${boxes.length}개 박스 + 공통정보 완료`);
    document.getElementById('bpdf').disabled = false;
    const isCommonMode = boxes.length > 0 && boxes[0].common;
    document.getElementById('bb').textContent = isCommonMode ? `공통 라벨 ${boxes.length}장` : `총 ${boxes.length}장`;
  } catch(e) {
    st('E', '❌ ' + e.message);
  }
}

function parseFullCSV(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = []; let row = [], c = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (q && text[i + 1] === '"') { c += '"'; i++; }
      else q = !q;
    } else if (ch === ',' && !q) {
      row.push(c); c = '';
    } else if (ch === '\n' && !q) {
      row.push(c); rows.push(row); row = []; c = '';
    } else {
      c += ch;
    }
  }
  if (c || row.length) { row.push(c); rows.push(row); }
  return rows.map(r => r.map(v => v.trim()));
}

function cn(s) {
  if (!s) return null;
  const ns = (s + '').replace(/[^0-9]/g, ' ').trim().split(/\s+/).filter(Boolean).map(Number).filter(n => !isNaN(n));
  return ns.length ? ns[ns.length - 1] : null;
}

function parseCSV(text) {
  const rows = parseFullCSV(text);
  let hi = -1, cA = -1, cB = -1, cNB = -1, cT = -1, cM = -1, cS = -1, cSKU = -1, cJAN = -1;
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const maxCol = Math.min(r.length, 15);
    let _cA = -1, _cB = -1, _cNB = -1, _cT = -1, _cM = -1, _cS = -1, _cSKU = -1, _cJAN = -1;
    for (let j = 0; j < maxCol; j++) {
      const v = (r[j] || '').toLowerCase().trim();
      if ((v === 'box no' || v.includes('box no')) && !v.includes('of')) _cB = j;
      if (v.includes('no. of box') || v.includes('no of box') || v.includes('박스 개수') || v.includes('상자 개수')) _cNB = j;
      if (v.includes('총수량') || v.includes('総数量')) _cT = j;
      if (v.includes('본품') || v.includes('本品')) _cM = j;
      if (v.includes('예비') || v.includes('予備')) _cS = j;
      if (v.includes('아티스트') || v.includes('상품명')) _cA = j;
      if (v.includes('品番') || v.includes('sku')) _cSKU = j;
      if (v.includes('バーコード') || v.includes('jan') || v.includes('barcode')) _cJAN = j;
    }
    if (_cT > -1 && (_cB > -1 || _cNB > -1)) {
      hi = i; cA = _cA; cB = _cB; cNB = _cNB; cT = _cT; cM = _cM; cS = _cS; cSKU = _cSKU; cJAN = _cJAN;
      break;
    }
  }
  if (hi === -1) return [];

  const isCommon = cNB > -1 && cB === -1;
  if (cA === -1) cA = Math.max(0, (cB > -1 ? cB : cNB) - 2);
  if (cM === -1) cM = cT + 1;
  if (cS === -1) cS = cT + 2;

  const bxs = []; let ln = null;
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.every(c => !c)) continue;
    const aR = (r[cA] || '').trim();
    const bRaw = isCommon ? (r[cNB] || '').trim() : (r[cB] || '').trim();
    const tR = (r[cT] || '').trim(), mR = (r[cM] || '').trim(), sR = (r[cS] || '').trim();
    const skuR = cSKU > -1 ? (r[cSKU] || '').trim() : '';
    const janR = cJAN > -1 ? (r[cJAN] || '').trim() : '';

    if (aR.toLowerCase() === 'total' || aR === '합계') break;
    const boxCount = bRaw ? cn(bRaw) : null;
    const total = tR ? cn(tR) : null, main = mR ? cn(mR) : null, spare = sR ? cn(sR) : null;
    if (!boxCount && !aR) continue;

    if (isCommon) {
      const count = boxCount || 1;
      for (let k = 0; k < count; k++) {
        bxs.push({no: null, single: true, common: true, count, a: aR, t: total || 0, m: main, s: spare || 0, sku: skuR, jan: janR});
      }
    } else {
      const no = boxCount;
      if (!no && !aR) continue;
      if (no) {
        const ex = bxs.find(b => b.no === no);
        if (ex) {
          if (ex.single) { ex.single = false; ex.rows = [{a: ex.a, m: ex.m, s: ex.s, sku: ex.sku, jan: ex.jan}]; delete ex.a; delete ex.m; delete ex.s; delete ex.sku; delete ex.jan; }
          ex.rows.push({a: aR, m: main, s: spare || 0, sku: skuR, jan: janR});
        } else {
          bxs.push({no, single: true, a: aR, t: total || 0, m: main, s: spare || 0, sku: skuR, jan: janR});
          ln = no;
        }
      } else if (aR && ln !== null) {
        const ex = bxs.find(b => b.no === ln);
        if (ex) {
          if (ex.single) { ex.single = false; ex.rows = [{a: ex.a, m: ex.m, s: ex.s, sku: ex.sku, jan: ex.jan}]; delete ex.a; delete ex.m; delete ex.s; delete ex.sku; delete ex.jan; }
          ex.rows.push({a: aR, m: main, s: spare || 0, sku: skuR, jan: janR});
        }
      }
    }
  }
  return bxs;
}

/* ★ FIX #3: [라벨 공통 정보] 마커 아래만 스캔, 시트 순서 기억 */
function parseCommonInfo(text) {
  const rows = parseFullCSV(text);
  const map = {};
  const order = [];

  const KEY_MAP = [
    { match: v => v.includes('事務所'),                                                   key: '事務所' },
    { match: v => v.includes('상품명') || v.includes('商品名'),                           key: '상품명' },
    { match: v => v.includes('原産国') || v.includes('원산국'),                           key: '原産国' },
    { match: v => v.includes('品番')   || v.includes('SKU'),                             key: '品番' },
    { match: v => v.includes('バーコード') || v.includes('JAN') || v.includes('바코드'),  key: 'バーコード' },
  ];

  let startRow = 0;
  for (let ri = 0; ri < rows.length; ri++) {
    if (rows[ri].some(c => safeTrim(c).includes('라벨 공통 정보') || safeTrim(c).includes('라벨공통정보'))) {
      startRow = ri + 1;
      break;
    }
  }

  for (let ri = startRow; ri < rows.length; ri++) {
    const r = rows[ri];
    if (!r || r.length < 2) continue;
    for (let ci = 0; ci < r.length; ci++) {
      const cell = safeTrim(r[ci]);
      if (!cell) continue;
      const found = KEY_MAP.find(k => k.match(cell));
      if (!found || map[found.key]) continue;
      const vals = r.slice(ci + 1).map(v => safeTrim(v)).filter(Boolean);
      const value = vals.join('\n');
      if (value) {
        map[found.key] = value;
        order.push(found.key);
      }
    }
  }
  return { map, order };
}

function buildCommonUI() {
  const container = document.getElementById('common-fg');
  container.innerHTML = '';

  const fixed = [
    {key:'상품명', label:'商品名', id:'fn', type:'textarea', rows:3},
    {key:'事務所', label:'事務所', id:'fo', type:'text'},
    {key:'品番', label:'品番', id:'fs', type:'text'},
    {key:'バーコード', label:'バーコード / JAN', id:'fj', type:'text'},
    {key:'原産国', label:'原産国', id:'fr', type:'text'}
  ];

  fixed.forEach(f => {
    const value = commonData[f.key] || (f.key === '原産国' ? 'MADE IN KOREA' : '');
    const div = document.createElement('div');
    div.className = f.key === '상품명' ? 'fi full' : 'fi';
    div.innerHTML = `
      <label>${f.label}</label>
      ${f.type === 'textarea'
        ? `<textarea id="${f.id}" rows="${f.rows}" oninput="render()">${value}</textarea>`
        : `<input id="${f.id}" type="text" value="${value}" oninput="render()">`}
    `;
    container.appendChild(div);
  });

  /* ★ FIX: バーコード 오타 수정 (バー코드 → バーコード) */
  Object.keys(commonData).forEach(k => {
    if (['상품명','事務所','品番','バーコード','原産国'].includes(k)) return;
    const div = document.createElement('div');
    div.className = 'fi';
    div.innerHTML = `
      <label>${k}</label>
      <input id="extra_${k}" type="text" value="${commonData[k]}" oninput="render()">
    `;
    container.appendChild(div);
  });
}

function refresh() {
  if (boxes.length) render();
  const o = document.getElementById('ao');
  o.style.display = 'inline';
  setTimeout(() => o.style.display = 'none', 2000);
}

function autoFitLabel(lbl) {
  const lb = lbl.querySelector('.lb');
  if (!lb) return;
  lb.style.transform = '';
  lb.style.transformOrigin = '';
  const lhEl = lbl.querySelector('.lh');
  const liEl = lbl.querySelector('.li');
  const lhH = lhEl ? lhEl.offsetHeight : 0;
  const liH = liEl ? liEl.offsetHeight : 0;
  const avail = lbl.offsetHeight - lhH - liH - 2;
  if (lb.scrollHeight > avail && avail > 0) {
    const scale = avail / lb.scrollHeight;
    lb.style.transform = `scaleY(${scale})`;
    lb.style.transformOrigin = 'top left';
  }
}

function render() {
  const s = sh();
  const div = document.getElementById('sp');
  let h = '<div class="sg">';
  boxes.forEach(b => {
    h += `<div class="sw">
      <div class="sn">${b.common ? '共通ラベル ' + (boxes.indexOf(b) + 1) + ' / ' + boxes.length : 'BOX ' + String(b.no).padStart(2, '0') + ' / ' + boxes.length}</div>
      <div class="ss"><div class="si">${lblHTML(b, s)}</div></div>
    </div>`;
  });
  h += '</div>';
  div.innerHTML = h;
  requestAnimationFrame(() => {
    div.querySelectorAll('.lbl').forEach(el => autoFitLabel(el));
  });
}

async function doDownloadPDF() {
  if (!boxes.length) return;
  const s = sh();
  const prog = document.getElementById('pdf-progress');
  const bar = document.getElementById('pdf-bar');
  const msg = document.getElementById('pdf-msg');
  prog.classList.add('show');
  bar.style.width = '0%';

  const pdf = new jsPDF({unit: 'mm', format: [100, 100], orientation: 'portrait'});
  const wrap = document.createElement('div');
  wrap.style.cssText = "position:fixed;left:-9999px;top:0;width:378px;height:378px;overflow:hidden;background:#fff;font-family:'Noto Sans JP',sans-serif";
  document.body.appendChild(wrap);

  await document.fonts.load("bold 9pt 'Noto Sans JP'");

  async function imgToB64(url) {
    const urls = [url, ...PX.map(p => p(url))];
    for (const u of urls) {
      try {
        const r = await fetch(u);
        if (!r.ok) continue;
        const blob = await r.blob();
        return await new Promise(res => { const fr = new FileReader(); fr.onload = e => res(e.target.result); fr.readAsDataURL(blob); });
      } catch(e) {}
    }
    return '';
  }

  const [logoB64, iconB64] = await Promise.all([
    imgToB64('https://nemozlab.github.io/label/images/nemoz_logo.png'),
    imgToB64(ICON_IMG_URL)
  ]);

  await new Promise(r => setTimeout(r, 100));

  for (let i = 0; i < boxes.length; i++) {
    const b = boxes[i];
    bar.style.width = Math.round((i / boxes.length) * 90) + '%';
    msg.textContent = `BOX ${b.no || ''} (${i + 1}/${boxes.length})`;

    wrap.innerHTML = lblHTML(b, sh());
    const lbl = wrap.querySelector('.lbl');
    lbl.style.width = '378px';
    lbl.style.height = '378px';
    lbl.style.fontFamily = "'Noto Sans JP',sans-serif";
    const logoImg = lbl.querySelector('.lh-logo');
    if (logoImg && logoB64) logoImg.src = logoB64;
    const iconImg = lbl.querySelector('.li img');
    if (iconImg && iconB64) iconImg.src = iconB64;

    await new Promise(r => setTimeout(r, 80));
    await new Promise(r => requestAnimationFrame(r));
    autoFitLabel(lbl);
    await new Promise(r => setTimeout(r, 30));

    const canvas = await html2canvas(lbl, {scale: 2.5, useCORS: true, allowTaint: true, backgroundColor: '#ffffff', width: 378, height: 378});
    const imgData = canvas.toDataURL('image/jpeg', 0.75);
    if (i > 0) pdf.addPage([100, 100], 'p');
    pdf.addImage(imgData, 'JPEG', 0, 0, 100, 100, undefined, 'FAST');
  }

  document.body.removeChild(wrap);
  bar.style.width = '100%';
  msg.textContent = '저장 중...';
  await new Promise(r => setTimeout(r, 200));
  pdf.save('nemoz_label.pdf');
  prog.classList.remove('show');
}

function lblHTML(b, s) {
  const isCommon = !!b.common;
  const no = isCommon ? null : String(b.no).padStart(2, '0');
  const tHtml = `<span class="lv">${b.t} ea</span>`;

  const qtyRows = b.single
    ? `<div class="qty-row"><span class="qty-art">${b.a}</span><span class="qty-val">${b.m || 0} ea</span><span class="qty-val">${b.s || 0} ea</span></div>`
    : b.rows.map(r => `<div class="qty-row"><span class="qty-art">${r.a}</span><span class="qty-val">${r.m || 0} ea</span><span class="qty-val">${r.s || 0} ea</span></div>`).join('');

  const useSKU = b.single ? (b.sku || s['品番'] || '') : (b.rows && b.rows[0] ? b.rows[0].sku || s['品番'] : s['品番'] || '');
  /* ★ FIX #1: バー코드 오타 수정 → バーコード */
  const useJAN = b.single ? (b.jan || s['バーコード'] || '') : (b.rows && b.rows[0] ? b.rows[0].jan || s['バーコード'] : s['バーコード'] || '');

  const iconImg = `<img src="${ICON_IMG_URL}" alt="shipping icons" style="height:9mm;width:auto;display:block;max-width:90mm;object-fit:contain">`;

  return `<div class="lbl">
  <div class="lh">
    <span class="lh-t">製品情報</span>
    <img class="lh-logo" src="https://nemozlab.github.io/label/images/nemoz_logo.png" alt="NEMOZ">
  </div>
  <div class="lb">
    ${isCommon
      ? `<div class="lr" style="padding-top:2.5mm"><span class="lk">No. of Boxes</span><span class="lv">${b.count} Box</span></div>`
      : `<div class="lr" style="padding-top:1.5mm;align-items:center"><span class="lk">Box No.</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:22pt;font-weight:900;color:#111;line-height:1;letter-spacing:1pt">${no}</span></div>`}
    <div class="lr"><span class="lk">総数量</span>${tHtml}</div>
    <div class="qty-table">
      <div class="qty-header">
        <span class="qty-h art">アーティスト名</span>
        <span class="qty-h">本品</span>
        <span class="qty-h">予備</span>
      </div>
      ${qtyRows}
    </div>
    ${(commonOrder.length > 0 ? commonOrder : ['상품명','事務所','品番','バーコード','原産国']).map(k => {
      if (k === '事務所')     return `<div class="lr"><span class="lk">事務所</span><span class="lv">${s['事務所'] || ''}</span></div>`;
      if (k === '상품명')     return `<div class="lr"><span class="lk">商品名</span><span class="lv" style="white-space:pre-line">${s['상품명'] || ''}</span></div>`;
      if (k === '品番')       return useSKU ? `<div class="lr"><span class="lk">品番</span><span class="lv">${useSKU}</span></div>` : '';
      if (k === 'バーコード')  return useJAN ? `<div class="lr"><span class="lk">バーコード</span><span class="lv">${useJAN}</span></div>` : '';
      if (k === '原産国')     return `<div class="lr"><span class="lk">原産国</span><span class="lv">${s['原産国'] || 'MADE IN KOREA'}</span></div>`;
      return '';
    }).join('')}
  </div>
  <div class="li">${iconImg}</div>
</div>`;
}

function st(t, msg) {
  const el = document.getElementById('sa');
  if (t === 'L') el.innerHTML = `<div class="sb L"><div class="sp"></div>${msg}</div>`;
  else if (t === 'D') el.innerHTML = `<div class="sb D">${msg}</div>`;
  else el.innerHTML = `<div class="sb E">${msg}</div>`;
}

function showHelp() {
  document.getElementById('help-modal').classList.add('show');
}
function hideHelp() {
  document.getElementById('help-modal').classList.remove('show');
}
</script>
